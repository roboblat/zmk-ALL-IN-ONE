# ---- YADS dongle screen (ST7789V 135x240) config ----
# Loaded for the ergo_dongle shield. Geometry (width/height/offsets) is set in
# the devicetree override in ergo_dongle.overlay, not here.

# Orientation: horizontal (screen on its side). Flip if it's upside down.
CONFIG_DONGLE_SCREEN_HORIZONTAL=y
CONFIG_DONGLE_SCREEN_FLIPPED=n

# No ambient-light sensor on this build (we have no APDS9960). Keep it off or
# the build pulls in sensor code that has nothing to talk to.
CONFIG_DONGLE_SCREEN_AMBIENT_LIGHT=n

# Widgets - all on, including Bongo Cat (it's part of the default screen).
CONFIG_DONGLE_SCREEN_WPM_ACTIVE=y
CONFIG_DONGLE_SCREEN_MODIFIER_ACTIVE=y
CONFIG_DONGLE_SCREEN_LAYER_ACTIVE=y
CONFIG_DONGLE_SCREEN_OUTPUT_ACTIVE=y
CONFIG_DONGLE_SCREEN_BATTERY_ACTIVE=y

# Brightness + idle behaviour. BLK is on D6 (PWM), so dimming works.
CONFIG_DONGLE_SCREEN_MAX_BRIGHTNESS=80
CONFIG_DONGLE_SCREEN_MIN_BRIGHTNESS=10
CONFIG_DONGLE_SCREEN_DEFAULT_BRIGHTNESS=60
# Auto-dim/off after 5 min idle. Our fork adds a position-event wake path so the
# screen reliably comes back on the next keypress (the stock keycode-only wake
# is unreliable on dongle centrals with Zephyr 4.1).
CONFIG_DONGLE_SCREEN_IDLE_TIMEOUT_S=300
CONFIG_DONGLE_SCREEN_BRIGHTNESS_KEYBOARD_CONTROL=y

# Bongo Cat - WPM-driven (idle/slow/fast). Provided by our fork.
CONFIG_DONGLE_SCREEN_BONGO_ACTIVE=y

# System icon shown on GUI press: 2 = Windows (0 = macOS, 1 = Linux).
CONFIG_DONGLE_SCREEN_SYSTEM_ICON=2
